<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bee Social - The Hive</title>
    <style>
        :root {
            --hex-width: 120px;
            --hex-gap: 8px;
        }

        body {
            margin: 0;
            overflow: hidden; 
            background-color: #121212;
            font-family: sans-serif;
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            cursor: grab;
            position: relative;
            background: radial-gradient(circle, #2c2c2c 0%, #000000 100%);
        }

        #hive {
            position: absolute;
            top: 0;
            left: 0;
            will-change: transform;
        }

        .cell {
            width: var(--hex-width);
            height: calc(var(--hex-width) * 1.1547);
            background: #ffcc00; /* Bee yellow! */
            position: absolute;
            /* This creates the 6-sided shape */
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .cell img {
            width: 95%; /* Small gap to show "border" */
            height: 95%;
            object-fit: cover;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        #viewport:active { cursor: grabbing; }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="hive"></div>
    </div>

    <script>
        const hive = document.getElementById('hive');
        const viewport = document.getElementById('viewport');

        const cols = 15; 
        const rows = 15;
        const hexW = 120;
        const hexH = hexW * 1.1547;
        const gap = 8;

        // Generate the grid
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                let x = c * (hexW + gap);
                if (r % 2 === 1) x += (hexW + gap) / 2;
                let y = r * (hexH * 0.75 + gap);
                
                cell.style.left = `${x}px`;
                cell.style.top = `${y}px`;
                
                const img = document.createElement('img');
                // Using a random bee-related placeholder or user faces
                img.src = `https://i.pravatar.cc/150?u=bee${r}${c}`; 
                cell.appendChild(img);
                
                hive.appendChild(cell);
            }
        }

        // Dragging Logic
        let isDragging = false;
        let startX, startY;
        let translateX = 0, translateY = 0;

        viewport.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            hive.style.transform = `translate(${translateX}px, ${translateY}px)`;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });
    </script>
</body>
</html>
